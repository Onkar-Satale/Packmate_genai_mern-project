openapi: 3.0.0
info:
  title: PackMate API
  version: 2.0.0
  description: Enterprise-ready backend API for PackMate Trip Planner
servers:
  - url: http://localhost:5000/api
paths:
  /login:
    post:
      summary: User Login (Issues HttpOnly Refresh Token)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful login
  /register:
    post:
      summary: User Registration
      responses:
        '201':
          description: User created
  /trips:
    get:
      summary: Get user trips with pagination
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Paginated trips
    post:
      summary: Create a new trip
      responses:
        '201':
          description: Trip created
  /refresh-token:
    post:
      summary: Refresh JWT token using HttpOnly Cookie
      responses:
        '200':
          description: Standard New Token Response
  /logout:
    post:
      summary: Securely log out and wipe HttpOnly token cookie
      responses:
        '200':
          description: Cookie cleared
